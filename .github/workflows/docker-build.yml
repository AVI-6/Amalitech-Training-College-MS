on:
  push:
    branches:
      - main
      - "feature/**"
      - "releases/**"
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker Image
        run: |
          docker build -t my-app:${{ github.sha }} .
      - name: Push Docker Image to Registry
        run: |
          echo ${{ secrets.DOCKER_PASSWD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker tag my-app:${{ github.sha }} my-registry/my-app:${{ github.sha }}
          docker push my-registry/my-app:${{ github.sha }}

  push-image-to-ecr:
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{vars.AWSREGION}}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GithubActions
          role-session-name: github-actions
          #role-session-name: github-actions-${{ github.run_id }} for auditing purpose on cloudtrial   IAM session lists, and audit logs and helps identify which runs/agents created temporary credentials.

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: avi-school-ms
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

